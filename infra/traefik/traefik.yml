api:
  dashboard: false  # KEEP FALSE — enabling without auth middleware exposes routing config publicly.
  # To enable for debugging: add BasicAuth middleware AND bind to 127.0.0.1 before setting true.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: proxy

certificatesResolvers:
  letsencrypt:
    acme:
      email: ssl@kova.md
      storage: /acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
